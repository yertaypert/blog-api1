services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 settings.asgi:application
    env_file:
      - settings/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - sqlite_data:/app/data
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    expose:
      - "8000"

  celery_worker:
    build: .
    command: celery -A settings worker -l info
    env_file:
      - settings/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - sqlite_data:/app/data

  celery_beat:
    build: .
    command: celery -A settings beat -l info
    env_file:
      - settings/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - sqlite_data:/app/data

  flower:
    build: .
    command: celery -A settings flower --basic-auth=$${BLOG_FLOWER_USER}:$${BLOG_FLOWER_PASSWORD}
    ports:
      - "5555:5555"
    env_file:
      - settings/.env
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    depends_on:
      - web
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    restart: unless-stopped

volumes:
  sqlite_data:
  static_volume:
  media_volume: